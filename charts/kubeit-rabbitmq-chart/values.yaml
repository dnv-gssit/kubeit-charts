# Default values for RabbitMQ Helm chart.
---
tenantName: tenant2
component: rabbitmq
rabbitmqCluster:
  image: kubeitglobalsvcauxacrwe.azurecr.io/library/rabbitmq:4.1-management
  global:
    security:
      allowInsecureImages: true
  metadata:
  # name of the RabbitMQ cluster
    name: testmq-tenant
  spec:
    replicas: 1
    nofile:
      # Optional soft nofile limit applied at container startup (default 65536).
      soft: 65536
    resources:
      requests:
        cpu: 500m
        memory: 500Mi
      limits:
        memory: 800Mi
        cpu: 800m
    containers:
      volumeMount:
        name: persistence
    initContainers:
      volumeMount:
        name: persistence

  additionalConfig: |
    log.console.level = info
    channel_max = 1700
    default_user_tags.administrator = true
    vm_memory_high_watermark.absolute = 4Gi

  advancedConfig: ""

  defaultUserSecret: rabbitmq-test-default-user

  additionalPlugins: []
  tls:
    enabled: false
    secretName: rabbitmq-tls

# supports both: AKS build-in storage class and Azure File Share
persistentVolume:
  env: []
  # for environment variables in rabbitmq container
  # - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
  #   value: "+Q 65536 +P 1048576"
  # Note: if external is set to true the chart uses an external Azure File Share
  # via the file.csi.azure.com CSI driver (static provisioning).
  # Set to false to use AKS built-in storage classes.
  external: true
  # Naming for the StorageClass used to bind the static PersistentVolume to its PVC.
  # No StorageClass object is created — this name is only a binding label between PV and PVC.
  storageClass:
    # Set to true to generate a per-release name so multiple RabbitMQ installs
    # (dev/test/per environment) can coexist in the same cluster without name collisions.
    perRelease: false
    # Optional: override the StorageClass name used for binding.
    name: ""
  # Storage account secret used by the static PersistentVolume when workload identity
  # This secret must exist in the namespace specified by `namespace`.
  storageAccountSecret:
    name: rabbitmq-storageaccount-secret
    # Optional: set to a shared namespace if you keep the secret in a single tenant namespace.
    namespace: ""
  # set the storage class name
  storageClassName: azurefile-csi
  capacity:
  # configure PVC size
    storage: 2Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  mountOptions:
    - dir_mode=0777 # modify for enhanced security
    - file_mode=0777
    - uid=1001
    - gid=999
    - mfsymlinks
    - cache=strict
    - nosharesock # reduce probability of reconnect race
    - nobrl       # disable byte range lock requests to the server
    - actimeo=30  # reduce latency for metadata-heavy workloads
  csi:
    driver: file.csi.azure.com

  # Workload Identity support
  # Uses federated identity credentials instead of storage account keys.
  # Prerequisites:
  #   - Managed identity with a storage role on the storage account
  #     (token-only: "Storage File Data SMB MI Admin"; account-key: "Storage Account Contributor")
  #   - Federated identity credential linking the managed identity to the K8s service account
  workloadIdentity:
    # Mounts the share with a federated token instead of a storage account key.
    enabled: true
    # Client ID of the managed identity with access to the storage account
    clientID: ""
    # Default: true (keyless token-only mount).
    # SMB OAuth enabled on the storage account, and the "Storage File Data SMB MI Admin" role.
    mountWithWorkloadIdentityToken: true


  # All replicas share the same file share (ReadWriteMany).
  #
  # Required when static.enabled is true:
  #   - resourceGroup, storageAccount, shareName, volumeHandle
  #   - subscriptionID only if the storage account is in a different subscription
  #   - workloadIdentity.clientID when workloadIdentity.enabled is true
  static:
    # Default: true. The chart provisions storage by referencing a pre-existing share.
    enabled: true
    resourceGroup: ""       # e.g., "rg-rabbitmq-we-dev"
    storageAccount: ""      # e.g., "strabbitdev"
    shareName: ""           # e.g., "rabbitmq-tenant2"
    volumeHandle: ""        # e.g., "sub-abc123#strabbitdev#rabbitmq-tenant2"
    subscriptionID: ""      # e.g., "ecc5958f-c223-4e29-b41b-e40dfaa40e5d"


# Create rabbitmq queue via RabbitMQ CRD
queue: []
  # - name: testmq-tenant
  #   replicas: 1
  #   resources:
  #     requests:
  #       cpu: 500m
  #       memory: 500Mi
  #     limits:
  #       memory: 800Mi
  #   arguments:
  #     x_max_length_bytes: 1000000000
  #     x_message_ttl: 60000

# Configure RabbitMQ users with permissions
users: []
  # Default admin user
  # - name: default-admin
  #   vhost: /
  #   tags:
  #     - administrator
  #   permissions:
  #     configure: .*
  #     write: .*
  #     read: .*
  #   # Create external secret via KeyVault
  #   userK8sSecretName: admin-user-creds

pdb:
  create: false
  minAvailable: 1

service:
  create: true
  type: ClusterIP
  uiPort: 15672
  tcpPort: 5672
  amqpsPort: 5671
  httpPort: 15672

virtualService:
  create: true
  hosts: []
  useCors: false
  allowOrigins: []

destinationRule:
  create: true
  # LEAST_CONN sends new connections to the node with fewest active connections.
  # Recommended for long-lived AMQP connections to distribute load across RabbitMQ nodes.
  # Other options: ROUND_ROBIN, RANDOM, PASSTHROUGH
  loadBalancerAlgorithm: LEAST_CONN
  # Maximum number of TCP connections to the RabbitMQ service
  maxConnections: 1000

# KubeIT passed variables
dnsDomain: "kubeit.dnv.com"
internalDnsDomain: "kubeit-int.dnv.com"
shortRegion: "we"
clusterColour: "blue"
env: "dev"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account using workload identity
  annotations:
    azure.workload.identity/client-id: <CLIENT_ID>
    azure.workload.identity/tenant-id: adf10e2b-b6e9-41d6-be2f-c12bb566019c
  name: "rabbitmq-sa"
  # When persistentVolume.external is true, the RabbitMQ pods run under this service
  # account instead of the operator-created "<cluster>-server" account. The operator's
  # peer-discovery RBAC is bound to that operator account, so it does not cover this one.
  # Set to true to create a Role/RoleBinding granting this service account the
  # permissions required by rabbit_peer_discovery_k8s (needed for multi-node clusters).
  peerDiscoveryRBAC: true

# SecretStore is definition how to access Azure Key Vault
# serviceAccount must be created to use SecretStore with annotations for Workload Identity
# https://docs.kubeit.dnv.com/documentation/components/access-management/?h=workload#workload-identity
secretStore:
  create: false
  vaultUrl: "https://kubeit-dev-kv-sh-we.vault.azure.net/"

# ExternalSecrets is definition how to create k8s secret based on Azure Key Vault secret
#  - name: k8s-secret-name (to create)
#   data:
#     - key: k8s-secret-key (to create)
#       azureSecretName: name-of-secret-in-azure-key-vault
#     - key: k8s-secret-key2
#       ....
# SecretStore must be created to use ExternalSecrets
externalSecrets:
  - data:
    - azureSecretName: rabbitmq-user-nonprod
      key: username
    - azureSecretName: rabbitmq-passwd-nonprod
      key: password
    - azureSecretName: default-test-user-creds
      key: default_user.conf
    name: rabbitmq-test-default-user
  # Must have TLS enabled on rabbitmq server. Create TLS secret from Azure Key Vault certificate to encrypt traffic between client and RabbitMQ cluster
  # - data:
  #   - azureSecretName: rabbitMQTLS
  #     key: data
  #   name: rabbitmq-tls
  #   type: certificate
