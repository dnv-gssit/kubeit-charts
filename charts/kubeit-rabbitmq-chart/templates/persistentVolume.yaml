{{- if .Values.persistentVolume.static.enabled }}
{{- $scName := include "kubeit-rabbit-chart.storageClassName" . }}
{{- range $i := until (int .Values.rabbitmqCluster.spec.replicas) }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ printf "%s-pv-%d" $scName $i | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "kubeit-rabbit-chart.labels" $ | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  capacity:
    storage: {{ $.Values.persistentVolume.capacity.storage }}
  accessModes:
  {{- range $.Values.persistentVolume.accessModes }}
    - {{ . }}
  {{- end }}
  persistentVolumeReclaimPolicy: {{ $.Values.persistentVolume.persistentVolumeReclaimPolicy }}
  # Empty string = static binding; no StorageClass object is required.
  storageClassName: ""
  mountOptions:
  {{- range $.Values.persistentVolume.mountOptions }}
    - {{ . }}
  {{- end }}
  csi:
    driver: {{ $.Values.persistentVolume.csi.driver }}
    # volumeHandle must be unique per PV in the cluster; the trailing ordinal keeps
    # each replica's handle distinct while still pointing at the same Azure File share.
    volumeHandle: {{ printf "%s#server-%d" $.Values.persistentVolume.static.volumeHandle $i }}
    volumeAttributes:
      resourceGroup: {{ $.Values.persistentVolume.static.resourceGroup }}
      storageAccount: {{ $.Values.persistentVolume.static.storageAccount }}
      shareName: {{ $.Values.persistentVolume.static.shareName }}
      {{- if $.Values.persistentVolume.static.subscriptionID }}
      subscriptionID: {{ $.Values.persistentVolume.static.subscriptionID }}
      {{- end }}
      {{- if $.Values.persistentVolume.workloadIdentity.enabled }}
      clientID: {{ required "persistentVolume.workloadIdentity.clientID is required when workloadIdentity is enabled" $.Values.persistentVolume.workloadIdentity.clientID }}
      {{- if $.Values.persistentVolume.workloadIdentity.mountWithWorkloadIdentityToken }}
      mountWithWorkloadIdentityToken: "true"
      {{- end }}
      {{- end }}
    {{- if not $.Values.persistentVolume.workloadIdentity.enabled }}
    nodeStageSecretRef:
      name: {{ $.Values.persistentVolume.storageAccountSecret.name }}
      namespace: {{ default $.Release.Namespace $.Values.persistentVolume.storageAccountSecret.namespace }}
    {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-%s-%s-server-%d" $.Values.rabbitmqCluster.spec.containers.volumeMount.name $.Release.Name $.Values.tenantName $i | trunc 63 | trimSuffix "-" }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    {{- include "kubeit-rabbit-chart.labels" $ | nindent 4 }}
spec:
  accessModes:
  {{- range $.Values.persistentVolume.accessModes }}
    - {{ . }}
  {{- end }}
  storageClassName: ""
  resources:
    requests:
      storage: {{ $.Values.persistentVolume.capacity.storage }}
  volumeName: {{ printf "%s-pv-%d" $scName $i | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- end }}
